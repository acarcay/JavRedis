# =============================================
# JavRedis — Sunucu Konfigürasyonu
# =============================================

# Sunucunun dinleyeceği port
server.port=8080

# Sunucu rolü: leader | follower
server.role=leader

# LRU Cache maksimum anahtar kapasitesi
server.capacity=10000

# Follower sunucular (sadece Leader için geçerli)
# Formatlar: "localhost:8081" veya salt "8081" ikisi de desteklenir
replication.followers=localhost:8081,localhost:8082

# Follower bağlantı timeout süresi (ms)
replication.connect.timeout.ms=3000

# İstemci idle timeout süresi (saniye) — bu süre geçerse bağlantı kapatılır
server.idle.timeout.seconds=60
